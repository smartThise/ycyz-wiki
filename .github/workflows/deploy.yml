# =============================================================================
# 银川一中 Wiki · GitHub Actions 自动构建与发布
# 触发条件: main 分支收到 push (含 PR 合并) 时自动编译并发布到 gh-pages
# 文档: https://squidfunk.github.io/mkdocs-material/publishing-your-site/
# =============================================================================
name: Deploy Wiki

on:
  # main 分支的 push 事件 (含 PR 合并到 main,合并本身即一次 push)
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy.yml'
  # 对 main 的 Pull Request:仅构建测试,不真正发布 (下方作业判断决定)
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy.yml'
  # 支持手动触发,便于随时强制重发布
  workflow_dispatch:

# 发布需要写入 gh-pages 分支的权限
permissions:
  contents: write

# 避免并发部署冲突
concurrency:
  group: deploy-wiki
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: 构建 Material 站点并发布到 gh-pages
    runs-on: ubuntu-latest

    steps:
      # ---- 1. 检出代码 (含完整历史,供 gh-deploy 创建提交) ----
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- 2. 配置 Python 环境 ----
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            mkdocs.yml

      # ---- 3. 安装 MkDocs Material 及常用插件 ----
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 若仓库根目录存在 requirements.txt 则一并安装,方便扩展更多插件
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install \
            "mkdocs>=1.6" \
            "mkdocs-material>=9.5" \
            "mkdocs-material-extensions" \
            "mkdocs-glightbox" \
            "mkdocs-git-revision-date-localized-plugin"

      # ---- 4. (可选) 配置 Git 用户,gh-deploy 提交时使用 ----
      - name: ⚙️ Configure Git
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ---- 5. 构建并在 PR 期间做一次校验 ----
      - name: 🏗️ Build (dry-run, pull request)
        if: github.event_name == 'pull_request'
        run: mkdocs build --strict

      # ---- 6. 发布到 gh-pages (仅 main 的 push / 手动触发) ----
      - name: 🚀 Deploy to gh-pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdocs gh-deploy --force --message "🤖 CI deploy: ${{ github.sha }}"
