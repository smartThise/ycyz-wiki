# =============================================================================
# 银川一中 Wiki · GitHub Actions 自动构建与发布
# 方式: upload-pages-artifact + deploy-pages (MkDocs Material 官方推荐)
#       直接上传构建产物部署,绕开 legacy Jekyll 构建器,无需 gh-pages 分支
# 文档: https://squidfunk.github.io/mkdocs-material/publishing-your-site/
#        https://github.com/actions/deploy-pages
# =============================================================================
name: Deploy Wiki

on:
  # main 分支的 push 事件 (含 PR 合并,合并本身即一次 push)
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy.yml'
  # 对 main 的 PR:仅构建校验,不部署
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy.yml'
  # 支持手动触发,便于随时强制重发布
  workflow_dispatch:

# deploy-pages 需要 pages: write + id-token: write (OIDC)
permissions:
  contents: read
  pages: write
  id-token: write

# 避免并发部署冲突
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 构建:生成静态站点并打包为 artifact
  # ---------------------------------------------------------------------------
  build:
    name: 构建 MkDocs Material 站点
    runs-on: ubuntu-latest

    steps:
      # ---- 1. 检出代码 (含完整历史,供 git-revision-date 等插件使用) ----
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- 2. 配置 Python 环境 ----
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            mkdocs.yml

      # ---- 3. 安装 MkDocs Material 及常用插件 ----
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install \
            "mkdocs>=1.6" \
            "mkdocs-material>=9.5" \
            "mkdocs-material-extensions" \
            "mkdocs-glightbox" \
            "mkdocs-git-revision-date-localized-plugin"

      # ---- 4. 构建站点 (strict 严格模式,有警告即失败) ----
      - name: 🏗️ Build site
        run: mkdocs build --strict

      # ---- 5. 打包为 GitHub Pages artifact ----
      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ---------------------------------------------------------------------------
  # 部署:发布到 GitHub Pages (PR 时不执行)
  # ---------------------------------------------------------------------------
  deploy:
    name: 部署到 GitHub Pages
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    # 指定 github-pages 环境,deploy-pages 要求
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
